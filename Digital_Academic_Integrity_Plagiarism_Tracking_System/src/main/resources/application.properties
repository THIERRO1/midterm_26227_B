# ===========================
# APPLICATION CONFIGURATION
# ===========================
spring.application.name=plagiarism-tracker

# ===========================
# DATABASE CONFIGURATION
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/plagiarism_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE CONFIGURATION
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# IMPORTANT: Makes data.sql run AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===========================
# SERVER CONFIGURATION
# ===========================
server.port=8080
server.servlet.context-path=/

# ===========================
# SWAGGER / OPENAPI
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===========================
# LOGGING
# ===========================
logging.level.com.academic.plagiarism=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
