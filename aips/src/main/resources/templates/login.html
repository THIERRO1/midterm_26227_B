<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — AIPS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="login-page">

<div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
        <div class="logo-circle">🎓</div>
        <h1>AIPS</h1>
        <p>Academic Integrity & Plagiarism System</p>
    </div>

    <!-- Error Message -->
    <div class="alert alert-error" th:if="${param.error}">
        ⚠ Invalid email or password. Please try again.
    </div>

    <!-- Logout Message -->
    <div class="alert alert-success" th:if="${param.logout}">
        ✓ You have been logged out successfully.
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post" style="display:flex; flex-direction:column; gap:16px;">

        <div class="form-group">
            <label for="username">Email Address</label>
            <input type="email" id="username" name="username"
                   placeholder="your@email.ac.rw" required autocomplete="email"/>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" required autocomplete="current-password"/>
        </div>

        <button type="submit" class="btn btn-primary w-full"
                style="justify-content:center; padding:12px; font-size:15px; margin-top:4px;">
            Sign In →
        </button>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <div class="login-divider">Demo Credentials</div>

    <div style="background:#f8fafc; border-radius:8px; padding:14px 16px; font-size:13px; color:#475569; line-height:2;">
        <strong>Admin:</strong> admin@aips.ac.rw / admin123<br/>
        <strong>Student:</strong> alice.uwimana@student.aips.ac.rw / student123
    </div>

</div>

</body>
</html>
