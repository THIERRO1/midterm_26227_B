<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('User Detail', ~{::content})}">
<body>
<div th:fragment="content">

    <a th:href="@{/users}" style="color:var(--text-muted); text-decoration:none; font-size:13px; display:inline-flex; align-items:center; gap:6px; margin-bottom:20px;">
        ← Back to Users
    </a>

    <div style="display:grid; grid-template-columns: 1fr 2fr; gap:24px; max-width:900px;">

        <!-- Profile Card -->
        <div class="card" style="text-align:center; padding:32px 24px;">
            <div style="width:72px; height:72px; background:var(--blue); border-radius:50%;
                        display:flex; align-items:center; justify-content:center;
                        font-size:30px; color:#fff; font-weight:700; margin:0 auto 16px;"
                 th:text="${#strings.substring(user.fullName, 0, 1)}">A</div>

            <h2 style="font-family:'Playfair Display',serif; font-size:18px; color:var(--navy);" th:text="${user.fullName}">Name</h2>
            <p style="font-size:13px; color:var(--text-muted); margin-top:4px;" th:text="${user.email}">email</p>

            <div style="margin-top:16px;">
                <span class="badge"
                      th:classappend="'badge-' + ${#strings.toLowerCase(user.role?.roleName ?: 'student')}"
                      th:text="${user.role?.roleName ?: '—'}">STUDENT</span>
            </div>

            <div style="margin-top:12px;">
                <span class="badge"
                      th:class="${user.isActive ? 'badge badge-low' : 'badge badge-high'}"
                      th:text="${user.isActive ? '● Active' : '● Inactive'}">Active</span>
            </div>
        </div>

        <!-- Details Card -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">User Information</span>
            </div>
            <div class="card-body">
                <div class="detail-row">
                    <span class="detail-label">Student ID</span>
                    <span class="detail-value" th:text="${user.studentId ?: '—'}">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Province</span>
                    <span class="detail-value" th:text="${user.province?.provinceName ?: '—'}">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Province Code</span>
                    <code style="background:#f1f5f9; padding:3px 8px; border-radius:5px; font-size:12px;"
                          th:text="${user.province?.provinceCode ?: '—'}">KGL</code>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Role</span>
                    <span class="detail-value" th:text="${user.role?.roleName ?: '—'}">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Account Status</span>
                    <span class="detail-value" th:text="${user.isActive ? 'Active' : 'Inactive'}">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Registered</span>
                    <span class="detail-value" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd MMM yyyy, HH:mm') : '—'}">—</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Enrolled Courses -->
    <div class="card" style="margin-top:24px; max-width:900px;" th:if="${not #sets.isEmpty(user.courses)}">
        <div class="card-header">
            <span class="card-title">📚 Enrolled Courses (Many-to-Many)</span>
        </div>
        <div class="card-body" style="display:flex; gap:10px; flex-wrap:wrap;">
            <div th:each="course : ${user.courses}"
                 style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px 16px;">
                <div style="font-weight:600; font-size:14px;" th:text="${course.courseName}">Course</div>
                <div style="font-size:12px; color:var(--text-muted);" th:text="${course.courseCode}">Code</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
