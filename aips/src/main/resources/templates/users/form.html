<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Add User', ~{::content})}">
<body>
<div th:fragment="content">

    <div style="max-width:720px;">

        <!-- Back link -->
        <a th:href="@{/users}" style="color:var(--text-muted); text-decoration:none; font-size:13px; display:inline-flex; align-items:center; gap:6px; margin-bottom:20px;">
            ← Back to Users
        </a>

        <div class="card">
            <div class="card-header">
                <span class="card-title">👤 Add New User</span>
            </div>
            <div class="card-body">

                <!--
                    existsBy() validation note:
                    When form is submitted, UserService.saveUser() checks:
                    1. userRepository.existsByEmail(email) → prevents duplicate email
                    2. userRepository.existsByStudentId(studentId) → prevents duplicate ID

                    If duplicate: RuntimeException is thrown and shown as error alert
                    Generated SQL: SELECT COUNT(*) > 0 FROM users WHERE email = ?
                -->

                <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

                <form th:action="@{/users/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" name="fullName" placeholder="e.g. Alice Uwimana" required/>
                        </div>

                        <div class="form-group">
                            <label>Email Address *</label>
                            <input type="email" name="email" placeholder="e.g. alice@student.ac.rw" required/>
                        </div>

                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" name="password" placeholder="Minimum 8 characters" required/>
                        </div>

                        <div class="form-group">
                            <label>Student ID</label>
                            <input type="text" name="studentId" placeholder="e.g. STU-2024-001"/>
                        </div>

                        <div class="form-group">
                            <label>Role *</label>
                            <select name="role.id" required>
                                <option value="">— Select Role —</option>
                                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.roleName}">STUDENT</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Province *</label>
                            <select name="province.id" required>
                                <option value="">— Select Province —</option>
                                <option th:each="p : ${provinces}" th:value="${p.id}"
                                        th:text="${p.provinceName + ' (' + p.provinceCode + ')'}">Province</option>
                            </select>
                        </div>
                    </div>

                    <!-- Note box -->
                    <div style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:14px 16px; margin:20px 0; font-size:13px; color:#1e40af;">
                        <strong>existsBy() Check:</strong> The system will automatically verify that the email address
                        and Student ID are not already registered before saving.
                    </div>

                    <div style="display:flex; gap:12px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">✓ Save User</button>
                        <a th:href="@{/users}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
