<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Upload Submission', ~{::content})}">
<body>
<div th:fragment="content">

    <div style="max-width:720px;">
        <a th:href="@{/submissions}" style="color:var(--text-muted); text-decoration:none; font-size:13px; margin-bottom:20px; display:inline-flex; align-items:center; gap:6px;">
            ← Back to Submissions
        </a>

        <div class="card">
            <div class="card-header">
                <span class="card-title">📤 Upload Assignment</span>
            </div>
            <div class="card-body">

                <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

                <form th:action="@{/submissions/upload}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>Assignment Title *</label>
                            <input type="text" name="title" placeholder="e.g. Database Design Assignment" required/>
                        </div>

                        <div class="form-group">
                            <label>Course *</label>
                            <select name="course.id" required>
                                <option value="">— Select Course —</option>
                                <option th:each="c : ${courses}" th:value="${c.id}"
                                        th:text="${c.courseCode + ' — ' + c.courseName}">Course</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Student *</label>
                            <select name="student.id" required>
                                <option value="">— Select Student —</option>
                                <option th:each="s : ${students}" th:value="${s.id}"
                                        th:text="${s.fullName + ' (' + (s.studentId ?: 'No ID') + ')'}">Student</option>
                            </select>
                        </div>

                        <!-- File Upload Area -->
                        <div class="form-group full-width">
                            <label>Assignment File *</label>
                            <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
                                <input type="file" id="fileInput" name="file" accept=".pdf,.docx" required/>
                                <div class="file-upload-icon">📎</div>
                                <div class="file-upload-label">
                                    <strong>Click to upload</strong> or drag and drop<br/>
                                    <span style="font-size:12px; color:#94a3b8;">Supported: PDF, DOCX (max 10MB)</span>
                                </div>
                                <div id="fileNameDisplay" style="margin-top:8px; font-size:13px; color:var(--blue); display:none;"></div>
                            </div>
                        </div>
                    </div>

                    <div style="background:#f0fdf4; border:1px solid #a7f3d0; border-radius:8px; padding:14px 16px; margin:20px 0; font-size:13px; color:#065f46;">
                        ℹ️ After upload, the system will automatically run plagiarism detection and generate a similarity report.
                    </div>

                    <div style="display:flex; gap:12px;">
                        <button type="submit" class="btn btn-primary">📤 Submit Assignment</button>
                        <a th:href="@{/submissions}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function() {
            const display = document.getElementById('fileNameDisplay');
            if (this.files.length > 0) {
                display.textContent = '📄 ' + this.files[0].name;
                display.style.display = 'block';
            }
        });
    </script>

</div>
</body>
</html>
