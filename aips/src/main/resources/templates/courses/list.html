<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Courses', ~{::content})}">
<body>
<div th:fragment="content">

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
        <div style="display:flex; gap:8px; align-items:center;">
            <form th:action="@{/courses}" method="get" style="display:flex; gap:8px;">
                <select name="sortBy" onchange="this.form.submit()" style="padding:9px 12px; font-size:13px;">
                    <option value="courseName" th:selected="${sortBy == 'courseName'}">Sort by Name</option>
                    <option value="courseCode" th:selected="${sortBy == 'courseCode'}">Sort by Code</option>
                    <option value="creditHours" th:selected="${sortBy == 'creditHours'}">Sort by Credits</option>
                </select>
                <select name="dir" onchange="this.form.submit()" style="padding:9px 12px; font-size:13px;">
                    <option value="asc"  th:selected="${dir == 'asc'}">↑ Ascending</option>
                    <option value="desc" th:selected="${dir == 'desc'}">↓ Descending</option>
                </select>
            </form>
        </div>
        <a th:href="@{/courses/new}" class="btn btn-primary">+ Add Course</a>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-title">📚 All Courses</span>
            <span class="text-muted" style="font-size:13px;" th:text="${totalElements} + ' courses'"></span>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Code</th>
                        <th>Course Name</th>
                        <th>Credits</th>
                        <th>Semester</th>
                        <th>Enrolled Students</th>
                        <th>Submissions</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course, iter : ${courses}">
                        <td class="text-muted" th:text="${iter.count + (currentPage * 10)}">1</td>
                        <td>
                            <code style="background:var(--surface-3); padding:4px 10px; border-radius:6px; font-size:12px; font-weight:600; color:var(--blue);"
                                  th:text="${course.courseCode}">CS301</code>
                        </td>
                        <td style="font-weight:500;" th:text="${course.courseName}">Course Name</td>
                        <td style="text-align:center;" th:text="${course.creditHours ?: '—'}">3</td>
                        <td>
                            <span style="font-size:12px; background:#f0fdf4; color:#166534; padding:3px 8px; border-radius:20px;"
                                  th:text="${course.semester ?: '—'}">2026-S1</span>
                        </td>
                        <td style="text-align:center;">
                            <span style="font-weight:600; color:var(--navy);"
                                  th:text="${course.enrolledStudents != null ? #sets.size(course.enrolledStudents) : 0}">0</span>
                        </td>
                        <td style="text-align:center;">
                            <span style="font-weight:600; color:var(--navy);"
                                  th:text="${course.submissions != null ? #lists.size(course.submissions) : 0}">0</span>
                        </td>
                        <td>
                            <a th:href="@{/courses/{id}(id=${course.id})}" class="btn btn-secondary btn-sm">View</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-icon">📚</div>
                                <p>No courses found</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-btn" th:classappend="${currentPage == 0 ? 'disabled' : ''}"
               th:href="@{/courses(page=${currentPage - 1}, size=10, sortBy=${sortBy}, dir=${dir})}">‹</a>
            <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-btn"
               th:classappend="${i == currentPage ? 'active' : ''}"
               th:href="@{/courses(page=${i}, size=10, sortBy=${sortBy}, dir=${dir})}"
               th:text="${i + 1}">1</a>
            <a class="page-btn" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}"
               th:href="@{/courses(page=${currentPage + 1}, size=10, sortBy=${sortBy}, dir=${dir})}">›</a>
        </div>
    </div>

</div>
</body>
</html>
