<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Add Course', ~{::content})}">
<body>
<div th:fragment="content">
    <div style="max-width:640px;">
        <a th:href="@{/courses}" style="color:var(--text-muted); text-decoration:none; font-size:13px; display:inline-flex; align-items:center; gap:6px; margin-bottom:20px;">← Back to Courses</a>
        <div class="card">
            <div class="card-header"><span class="card-title">📚 Add New Course</span></div>
            <div class="card-body">
                <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
                <form th:action="@{/courses/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Course Code *</label>
                            <input type="text" name="courseCode" placeholder="e.g. CS301" required/>
                        </div>
                        <div class="form-group">
                            <label>Credit Hours</label>
                            <input type="number" name="creditHours" placeholder="e.g. 3" min="1" max="6"/>
                        </div>
                        <div class="form-group full-width">
                            <label>Course Name *</label>
                            <input type="text" name="courseName" placeholder="e.g. Database Systems" required/>
                        </div>
                        <div class="form-group">
                            <label>Semester</label>
                            <input type="text" name="semester" placeholder="e.g. 2026-S1"/>
                        </div>
                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea name="description" rows="3" placeholder="Course description..."></textarea>
                        </div>
                    </div>
                    <div style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:12px 16px; margin:16px 0; font-size:13px; color:#1e40af;">
                        <strong>existsBy() Check:</strong> Course code uniqueness is verified before saving using <code>existsByCourseCode()</code>.
                    </div>
                    <div style="display:flex; gap:12px; margin-top:8px;">
                        <button type="submit" class="btn btn-primary">✓ Save Course</button>
                        <a th:href="@{/courses}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
